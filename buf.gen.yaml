version: v1
managed:
  enabled: true
  go_package_prefix:
    default: github.com/findit-it/user-svc/api
    except:
      - buf.build/googleapis/googleapis
plugins:
  - name: go
    out: api
    opt: paths=source_relative
  - name: go-grpc
    out: api
    opt:
      - paths=source_relative
  - name: grpc-gateway
    out: api
    opt:
      - paths=source_relative
  - name: openapiv2
    out: api/doc
  - name: doc
    out: api/doc
